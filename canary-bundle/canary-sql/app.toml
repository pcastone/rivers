# ─────────────────────────────────────────────
# SQL Profile — Datasources
# ─────────────────────────────────────────────

[data.datasources.canary-pg]
name               = "canary-pg"
driver             = "postgres"
host               = "192.168.2.209"
port               = 5432
database           = "rivers"
username           = "rivers"
credentials_source = "lockbox://postgres/test"

[data.datasources.canary-mysql]
name               = "canary-mysql"
driver             = "mysql"
host               = "192.168.2.215"
port               = 3306
database           = "rivers"
username           = "rivers"
credentials_source = "lockbox://mysql/test"

[data.datasources.canary-sqlite]
name       = "canary-sqlite"
driver     = "sqlite"
database   = "canary-sql/data/canary.db"
nopassword = true

# ─────────────────────────────────────────────
# DataViews — parameter names deliberately non-alphabetical
# $zname appears before $age in queries to trap Issue #54
# ─────────────────────────────────────────────

# ── PostgreSQL DataViews ──

[data.dataviews.pg_param_test]
name       = "pg_param_test"
datasource = "canary-pg"
query      = "SELECT zname, age FROM canary_records WHERE zname = $zname AND age = $age"

[[data.dataviews.pg_param_test.parameters]]
name     = "zname"
type     = "string"
required = true

[[data.dataviews.pg_param_test.parameters]]
name     = "age"
type     = "integer"
required = true

[data.dataviews.pg_insert]
name       = "pg_insert"
datasource = "canary-pg"
query      = "INSERT INTO canary_records (id, zname, age) VALUES ($id, $zname, $age)"

[[data.dataviews.pg_insert.parameters]]
name = "id"
type = "string"
required = true

[[data.dataviews.pg_insert.parameters]]
name = "zname"
type = "string"
required = true

[[data.dataviews.pg_insert.parameters]]
name = "age"
type = "integer"
required = true

[data.dataviews.pg_select_all]
name       = "pg_select_all"
datasource = "canary-pg"
query      = "SELECT id, zname, age FROM canary_records"

[data.dataviews.pg_update]
name       = "pg_update"
datasource = "canary-pg"
query      = "UPDATE canary_records SET zname = $zname, age = $age WHERE id = $id"

[[data.dataviews.pg_update.parameters]]
name     = "id"
type     = "string"
required = true

[[data.dataviews.pg_update.parameters]]
name     = "zname"
type     = "string"
required = true

[[data.dataviews.pg_update.parameters]]
name     = "age"
type     = "integer"
required = true

[data.dataviews.pg_delete]
name       = "pg_delete"
datasource = "canary-pg"
query      = "DELETE FROM canary_records WHERE id = $id"

[[data.dataviews.pg_delete.parameters]]
name     = "id"
type     = "string"
required = true

[data.dataviews.pg_select_by_id]
name       = "pg_select_by_id"
datasource = "canary-pg"
query      = "SELECT * FROM canary_records WHERE id = $id"

[[data.dataviews.pg_select_by_id.parameters]]
name     = "id"
type     = "string"
required = true

[data.dataviews.pg_cached]
name       = "pg_cached"
datasource = "canary-pg"
query      = "SELECT id, zname, age FROM canary_records"
max_rows   = 10

[data.dataviews.pg_cached.caching]
ttl_seconds = 60

[data.dataviews.pg_ddl_trap]
name       = "pg_ddl_trap"
datasource = "canary-pg"
query      = "DROP TABLE canary_records"

[data.dataviews.pg_bad_query]
name       = "pg_bad_query"
datasource = "canary-pg"
query      = "SELECT * FROM nonexistent_table_xyz"

