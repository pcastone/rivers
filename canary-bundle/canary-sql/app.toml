[api.views.pg_param_order]
path      = "canary/sql/pg/param-order"
method    = "GET"
view_type = "Rest"
auth      = "none"

[api.views.pg_param_order.handler]
type       = "codecomponent"
language   = "javascript"
module     = "libraries/handlers/sql-tests.ts"
entrypoint = "pgParamOrder"

