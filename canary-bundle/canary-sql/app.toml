# ─────────────────────────────────────────────
# SQL Profile — Datasources
# ─────────────────────────────────────────────

[data.datasources.pg]
name       = "pg"
driver     = "postgres"
nopassword = true

[data.datasources.mysql]
name       = "mysql"
driver     = "mysql"
nopassword = true

[data.datasources.sqlite]
name       = "sqlite"
driver     = "sqlite"
database   = ":memory:"
nopassword = true

# ─────────────────────────────────────────────
# DataViews — parameter names deliberately non-alphabetical
# $zname appears before $age in queries to trap Issue #54
# ─────────────────────────────────────────────

# ── PostgreSQL DataViews ──

[data.dataviews.pg_param_test]
name       = "pg_param_test"
datasource = "pg"
query      = "SELECT zname, age FROM canary_records WHERE zname = $zname AND age = $age"

[[data.dataviews.pg_param_test.parameters]]
name     = "zname"
type     = "string"
required = true

[[data.dataviews.pg_param_test.parameters]]
name     = "age"
type     = "integer"
required = true

[data.dataviews.pg_insert]
name       = "pg_insert"
datasource = "pg"
query      = "INSERT INTO canary_records (id, zname, age, email) VALUES ($id, $zname, $age, $email)"

[[data.dataviews.pg_insert.parameters]]
name = "id"
type = "string"
required = true

[[data.dataviews.pg_insert.parameters]]
name = "zname"
type = "string"
required = true

[[data.dataviews.pg_insert.parameters]]
name = "age"
type = "integer"
required = true

[[data.dataviews.pg_insert.parameters]]
name = "email"
type = "string"
required = false

[data.dataviews.pg_select_all]
name       = "pg_select_all"
datasource = "pg"
query      = "SELECT id, zname, age, email FROM canary_records ORDER BY created_at DESC"

[data.dataviews.pg_ddl_trap]
name       = "pg_ddl_trap"
datasource = "pg"
query      = "DROP TABLE canary_records"

[data.dataviews.pg_bad_query]
name       = "pg_bad_query"
datasource = "pg"
query      = "SELECT * FROM nonexistent_table_xyz"

# ── MySQL DataViews ──

[data.dataviews.mysql_param_test]
name       = "mysql_param_test"
datasource = "mysql"
query      = "SELECT zname, age FROM canary_records WHERE zname = $zname AND age = $age"

[[data.dataviews.mysql_param_test.parameters]]
