bundle_path = "canary-bundle/"
app_id      = "canary-node-0"

[base]
host = "0.0.0.0"
port = 8090
request_timeout_seconds = 30
init_timeout_s = 60

[base.logging]
level  = "info"
format = "json"

[security]
cors_enabled         = true
cors_allowed_origins = ["http://localhost:8080"]
rate_limit_per_minute = 1000
rate_limit_burst_size = 500
# DDL whitelist — canary-sql can create test tables (must be before subtables)
ddl_whitelist = [
    "rivers@aaaaaaaa-bbbb-cccc-dddd-eeeeeeeeee01",
]

# Session config for canary-guard
[security.session]
enabled    = true
ttl_s      = 300
idle_timeout_s = 120

[security.session.cookie]
name      = "canary_session"
http_only = true
secure    = false
same_site = "Lax"

# CSRF enabled
[security.csrf]
enabled = true

[storage_engine]
backend = "memory"

[graphql]
enabled = false

# All engines + driver plugins are statically linked into the riversd
# binary (see `crates/riversd/src/server/drivers.rs`). No [engines] /
# [plugins] dir needed — cdylib plugin loading is disabled in this
# release per bugs/bugreport_2026-04-09.md (Tokio-runtime-per-cdylib
# SIGABRT). Future "Plugin ABI v2" will re-enable dynamic loading.

[base.tls]
cert     = "canary-bundle/release/canary/config/tls/server.crt"
key      = "canary-bundle/release/canary/config/tls/server.key"
redirect = false

[lockbox]
path       = "/Users/pcastone/Projects/rust/rivers.pub/sec/lockbox/rivers.rkeystore"
key_source = "file"
key_file   = "/Users/pcastone/Projects/rust/rivers.pub/sec/lockbox/identity.key"

# Raise task timeout to 30s so that scenario handlers can busy-wait for
# Kafka consumer propagation (activity-feed scenario spins up to 5s per step,
# 11 steps; doc-pipeline and messaging scenarios need headroom too).
[runtime.process_pools.default]
task_timeout_ms = 30000
