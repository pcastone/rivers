path      = "/canary/scenarios/stream/probe"
method    = "POST"
view_type = "Rest"
auth      = "none"

[api.views.scenario_probe.handler]
type       = "codecomponent"
language   = "typescript"
module     = "libraries/handlers/scenario-probe.ts"
entrypoint = "scenarioProbe"

# CS3 — Activity Feed scenario orchestrator.

[api.views.scenario_activity_feed]
path      = "/canary/scenarios/stream/activity-feed"
method    = "POST"
view_type = "Rest"
auth      = "none"

[api.views.scenario_activity_feed.handler]
type       = "codecomponent"
language   = "typescript"
module     = "libraries/handlers/scenario-activity-feed.ts"
entrypoint = "scenarioActivityFeed"
resources  = ["canary-kafka"]
