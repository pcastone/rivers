[[datasources]]
name       = "canary-kafka"
driver     = "kafka"
x-type     = "kafka"
lockbox    = "kafka/test"
required   = true

# CS3 — dedicated Kafka datasource for canary.events topic (activity-feed scenario).
# Separate from canary-kafka (kafka_consume topic) to avoid cross-polluting test
# verdicts. Same broker, different topic binding.
[[datasources]]
name       = "canary-kafka-events"
driver     = "kafka"
x-type     = "kafka"
lockbox    = "kafka/test"
required   = false

[[datasources]]
name       = "canary-redis"
driver     = "redis"
x-type     = "redis"
lockbox    = "redis/test"
required   = true

[[datasources]]
name       = "canary-faker"
driver     = "faker"
x-type     = "faker"
nopassword = true
required   = true

# CS3 — SQLite events table for Activity Feed scenario (spec §6 AF-7).
# Embedded; no external infra. required=false so bundle loads cleanly
# even in minimal deploys.
[[datasources]]
name       = "events_db"
driver     = "sqlite"
x-type     = "sqlite"
nopassword = true
required   = false
