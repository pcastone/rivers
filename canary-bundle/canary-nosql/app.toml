# ─────────────────────────────────────────────
# NoSQL Profile — Datasources
# ─────────────────────────────────────────────

[data.datasources.canary-mongo]
name               = "canary-mongo"
driver             = "mongodb"
host               = "192.168.2.212"
port               = 27017
database           = "canary"
username           = "rivers"
credentials_source = "lockbox://mongodb/test"

[data.datasources.canary-es]
name               = "canary-es"
driver             = "elasticsearch"
host               = "192.168.2.218"
port               = 9200
credentials_source = "lockbox://elasticsearch/test"

[data.datasources.canary-couch]
name               = "canary-couch"
driver             = "couchdb"
host               = "192.168.2.221"
port               = 5984
database           = "canary"
username           = "rivers"
credentials_source = "lockbox://couchdb/test"

[data.datasources.canary-cassandra]
name               = "canary-cassandra"
driver             = "cassandra"
host               = "192.168.2.224"
port               = 9042
credentials_source = "lockbox://cassandra/test"

[data.datasources.canary-ldap]
name               = "canary-ldap"
driver             = "ldap"
host               = "192.168.2.227"
port               = 389
database           = "dc=rivers,dc=test"
username           = "cn=admin,dc=rivers,dc=test"
credentials_source = "lockbox://ldap/test"

[data.datasources.canary-redis]
name               = "canary-redis"
driver             = "redis"
host               = "192.168.2.206"
port               = 6379
credentials_source = "lockbox://redis/test"

[data.datasources.canary-redis.extra]
cluster = "true"
hosts   = "192.168.2.206:6379,192.168.2.207:6379,192.168.2.208:6379"

# ─────────────────────────────────────────────
# DataViews — MongoDB
# ─────────────────────────────────────────────

[data.dataviews.mongo_ping]
name       = "mongo_ping"
datasource = "canary-mongo"
query      = '{"collection":"canary","operation":"find","filter":{}}'

[data.dataviews.mongo_insert]
name       = "mongo_insert"
datasource = "canary-mongo"
query      = '{"collection":"canary","operation":"insert"}'

[[data.dataviews.mongo_insert.parameters]]
name     = "name"
type     = "string"
required = true

[[data.dataviews.mongo_insert.parameters]]
name     = "value"
type     = "string"
required = true

[data.dataviews.mongo_find_by_name]
name       = "mongo_find_by_name"
datasource = "canary-mongo"
query      = '{"collection":"canary","operation":"find","filter":{"name":"$1"}}'

[[data.dataviews.mongo_find_by_name.parameters]]
name     = "name"
type     = "string"
required = true

[data.dataviews.mongo_delete_by_name]
name       = "mongo_delete_by_name"
datasource = "canary-mongo"
query      = '{"collection":"canary","operation":"delete"}'

[[data.dataviews.mongo_delete_by_name.parameters]]
name     = "_filter"
type     = "string"
required = true

# Negative test trap — admin command that should be rejected by Gate 1
[data.dataviews.mongo_drop_trap]
name       = "mongo_drop_trap"
datasource = "canary-mongo"
query      = '{"collection":"canary","operation":"drop_collection"}'

# ─────────────────────────────────────────────
# DataViews — Elasticsearch
# ─────────────────────────────────────────────

[data.dataviews.es_ping]
name       = "es_ping"
datasource = "canary-es"
query      = '{"index":"canary","body":{"query":{"match_all":{}}}}'

[data.dataviews.es_index_doc]
name       = "es_index_doc"
datasource = "canary-es"
query      = '{"index":"canary","operation":"index","id":"$1"}'

[[data.dataviews.es_index_doc.parameters]]
name     = "doc_id"
type     = "string"
required = true

[[data.dataviews.es_index_doc.parameters]]
name     = "title"
type     = "string"
required = true

[[data.dataviews.es_index_doc.parameters]]
name     = "body"
type     = "string"
required = true

[data.dataviews.es_search]
name       = "es_search"
datasource = "canary-es"
query      = '{"index":"canary","body":{"query":{"match_all":{}}}}'

# ─────────────────────────────────────────────
# DataViews — CouchDB
# ─────────────────────────────────────────────

[data.dataviews.couch_ping]
name       = "couch_ping"
datasource = "canary-couch"
query      = '{"operation":"find","selector":{}}'

[data.dataviews.couch_put_doc]
name       = "couch_put_doc"
datasource = "canary-couch"
query      = '{"operation":"insert","id":"$1"}'

[[data.dataviews.couch_put_doc.parameters]]
name     = "doc_id"
type     = "string"
required = true

[[data.dataviews.couch_put_doc.parameters]]
name     = "title"
type     = "string"
required = true

[data.dataviews.couch_get_doc]
name       = "couch_get_doc"
datasource = "canary-couch"
query      = "get $doc_id"

[[data.dataviews.couch_get_doc.parameters]]
name     = "doc_id"
type     = "string"
required = true

# ─────────────────────────────────────────────
# DataViews — Cassandra
# ─────────────────────────────────────────────

[data.dataviews.cassandra_ping]
name       = "cassandra_ping"
datasource = "canary-cassandra"
query      = "SELECT key FROM system.local"

[data.dataviews.cassandra_insert]
name       = "cassandra_insert"
datasource = "canary-cassandra"
query      = "INSERT INTO canary.records (id, name, value) VALUES (:id, :name, :value)"

[[data.dataviews.cassandra_insert.parameters]]
name     = "id"
type     = "string"
required = true

[[data.dataviews.cassandra_insert.parameters]]
name     = "name"
type     = "string"
required = true

[[data.dataviews.cassandra_insert.parameters]]
name     = "value"
type     = "string"
required = true

[data.dataviews.cassandra_select_by_id]
name       = "cassandra_select_by_id"
datasource = "canary-cassandra"
query      = "SELECT id, name, value FROM canary.records WHERE id = :id"

[[data.dataviews.cassandra_select_by_id.parameters]]
name     = "id"
type     = "string"
required = true

# ─────────────────────────────────────────────
# DataViews — LDAP
# ─────────────────────────────────────────────

[data.dataviews.ldap_ping]
name       = "ldap_ping"
datasource = "canary-ldap"
query      = "ping"

[data.dataviews.ldap_search]
name       = "ldap_search"
datasource = "canary-ldap"
query      = "search dc=rivers,dc=test sub (objectClass=*)"

[[data.dataviews.ldap_search.parameters]]
name     = "filter"
type     = "string"
required = true

# ─────────────────────────────────────────────
# DataViews — Redis
# ─────────────────────────────────────────────

[data.dataviews.redis_ping]
name       = "redis_ping"
datasource = "canary-redis"
query      = "PING"

[data.dataviews.redis_set]
name       = "redis_set"
datasource = "canary-redis"
query      = "SET $1 $2"

[[data.dataviews.redis_set.parameters]]
name     = "key"
type     = "string"
required = true

[[data.dataviews.redis_set.parameters]]
name     = "value"
type     = "string"
required = true

[data.dataviews.redis_get]
name       = "redis_get"
datasource = "canary-redis"
query      = "GET $1"

[[data.dataviews.redis_get.parameters]]
name     = "key"
type     = "string"
required = true

[data.dataviews.redis_del]
name       = "redis_del"
datasource = "canary-redis"
query      = "DEL $1"

[[data.dataviews.redis_del.parameters]]
name     = "key"
type     = "string"
required = true

# Negative test trap — admin command that should be rejected by Gate 1
[data.dataviews.redis_flushdb_trap]
name       = "redis_flushdb_trap"
datasource = "canary-redis"
query      = "FLUSHDB"

# ─────────────────────────────────────────────
# Views — MongoDB
# ─────────────────────────────────────────────

[api.views.mongo_ping]
path      = "/canary/nosql/mongo/ping"
method    = "GET"
view_type = "Rest"
auth      = "session"

[api.views.mongo_ping.handler]
type       = "codecomponent"
language   = "typescript"
module     = "libraries/handlers/nosql-tests.ts"
entrypoint = "mongoConnect"

[api.views.mongo_insert]
path      = "/canary/nosql/mongo/insert"
