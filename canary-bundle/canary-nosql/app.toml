# ─────────────────────────────────────────────
# NoSQL Profile — Datasources
# ─────────────────────────────────────────────

[data.datasources.canary-mongo]
name       = "canary-mongo"
driver     = "mongodb"
nopassword = true

[data.datasources.canary-es]
name       = "canary-es"
driver     = "elasticsearch"
nopassword = true

[data.datasources.canary-couch]
name       = "canary-couch"
driver     = "couchdb"
nopassword = true

[data.datasources.canary-cassandra]
name       = "canary-cassandra"
driver     = "cassandra"
nopassword = true

[data.datasources.canary-ldap]
name       = "canary-ldap"
driver     = "ldap"
nopassword = true

[data.datasources.canary-redis]
name       = "canary-redis"
driver     = "redis"
nopassword = true

# ─────────────────────────────────────────────
# DataViews — MongoDB
# ─────────────────────────────────────────────

[data.dataviews.mongo_ping]
name       = "mongo_ping"
datasource = "canary-mongo"
query      = '{"collection":"canary","operation":"find","filter":{}}'

[data.dataviews.mongo_insert]
name       = "mongo_insert"
datasource = "canary-mongo"
query      = '{"collection":"canary","operation":"insert"}'

[[data.dataviews.mongo_insert.parameters]]
name     = "name"
type     = "string"
required = true

[[data.dataviews.mongo_insert.parameters]]
name     = "value"
type     = "string"
required = true

[data.dataviews.mongo_find_by_name]
name       = "mongo_find_by_name"
datasource = "canary-mongo"
query      = '{"collection":"canary","operation":"find","filter":{"name":"$1"}}'

[[data.dataviews.mongo_find_by_name.parameters]]
name     = "name"
type     = "string"
required = true

[data.dataviews.mongo_delete_by_name]
name       = "mongo_delete_by_name"
datasource = "canary-mongo"
query      = '{"collection":"canary","operation":"delete"}'

[[data.dataviews.mongo_delete_by_name.parameters]]
name     = "_filter"
type     = "string"
required = true

# ─────────────────────────────────────────────
# DataViews — Elasticsearch
# ─────────────────────────────────────────────

[data.dataviews.es_ping]
name       = "es_ping"
datasource = "canary-es"
query      = '{"index":"canary","body":{"query":{"match_all":{}}}}'

# ─────────────────────────────────────────────
# DataViews — CouchDB
# ─────────────────────────────────────────────

[data.dataviews.couch_ping]
name       = "couch_ping"
datasource = "canary-couch"
query      = '{"operation":"find","selector":{}}'

# ─────────────────────────────────────────────
# DataViews — Cassandra
# ─────────────────────────────────────────────

[data.dataviews.cassandra_ping]
name       = "cassandra_ping"
datasource = "canary-cassandra"
query      = "SELECT key FROM system.local"

# ─────────────────────────────────────────────
# DataViews — LDAP
# ─────────────────────────────────────────────

[data.dataviews.ldap_ping]
name       = "ldap_ping"
datasource = "canary-ldap"
query      = "dc=canary,dc=test sub (objectClass=*)"

# ─────────────────────────────────────────────
# DataViews — Redis
# ─────────────────────────────────────────────

[data.dataviews.redis_ping]
name       = "redis_ping"
datasource = "canary-redis"
query      = "PING"

[data.dataviews.redis_set]
name       = "redis_set"
datasource = "canary-redis"
query      = "SET $1 $2"

[[data.dataviews.redis_set.parameters]]
name     = "key"
type     = "string"
required = true

[[data.dataviews.redis_set.parameters]]
name     = "value"
type     = "string"
required = true

[data.dataviews.redis_get]
name       = "redis_get"
datasource = "canary-redis"
query      = "GET $1"

[[data.dataviews.redis_get.parameters]]
name     = "key"
type     = "string"
required = true

[data.dataviews.redis_del]
name       = "redis_del"
datasource = "canary-redis"
query      = "DEL $1"

[[data.dataviews.redis_del.parameters]]
name     = "key"
type     = "string"
required = true

# Negative test trap — admin command that should be rejected by Gate 1
[data.dataviews.redis_flushdb_trap]
name       = "redis_flushdb_trap"
datasource = "canary-redis"
query      = "FLUSHDB"

# ─────────────────────────────────────────────
# Views — MongoDB
# ─────────────────────────────────────────────

[api.views.mongo_ping]
path      = "/canary/nosql/mongo/ping"
method    = "GET"
view_type = "Rest"
auth      = "none"

[api.views.mongo_ping.handler]
type       = "codecomponent"
language   = "typescript"
module     = "libraries/handlers/nosql-tests.ts"
entrypoint = "mongoConnect"

[api.views.mongo_crud]
path      = "/canary/nosql/mongo/crud"
method    = "GET"
view_type = "Rest"
auth      = "none"

[api.views.mongo_crud.handler]
type       = "codecomponent"
language   = "typescript"
module     = "libraries/handlers/nosql-tests.ts"
entrypoint = "mongoCrud"

