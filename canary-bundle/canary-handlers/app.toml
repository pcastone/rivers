# ─────────────────────────────────────────────
# RUNTIME Profile — Datasources
# ─────────────────────────────────────────────

[data.datasources.canary-faker]
name       = "canary-faker"
driver     = "faker"
nopassword = true

[data.datasources.canary-faker.config]
locale                = "en_US"
seed                  = 42
max_records_per_query = 100

# ─────────────────────────────────────────────
# DataViews
# ─────────────────────────────────────────────

[data.dataviews.list_records]
name          = "list_records"
datasource    = "canary-faker"
query         = "schemas/faker-record.schema.json"
return_schema = "schemas/faker-record.schema.json"

[[data.dataviews.list_records.parameters]]
name     = "limit"
type     = "integer"
required = false
default  = 10

# ─────────────────────────────────────────────
# Views — ctx.* API surface tests
# ─────────────────────────────────────────────

[api.views.ctx_request]
path      = "/canary/rt/ctx/request"
method    = "GET"
view_type = "Rest"
auth      = "none"

[api.views.ctx_request.handler]
type       = "codecomponent"
language   = "typescript"
module     = "libraries/handlers/ctx-surface.ts"
entrypoint = "ctxRequest"

# ─────────────────────────

[api.views.ctx_resdata]
path      = "/canary/rt/ctx/resdata"
