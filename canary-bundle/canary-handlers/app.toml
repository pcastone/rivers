# ── CS4 — Document Pipeline scenario endpoint ─────────────────────
# Spec §7. Hosted in canary-handlers per CS0.1 (2026-04-23 decision).
# Filesystem ops only; exec-driver-dependent steps (wc, allowlist
# rejection, exec-side path traversal probe) are marked "deferred"
# within the handler — CS4 ships a filesystem-scope MVP pending a
# separate exec-driver wiring task.

[api.views.scenario_doc_pipeline]
path      = "/canary/scenarios/runtime/doc-pipeline"
