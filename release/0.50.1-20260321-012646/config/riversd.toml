# Rivers server configuration — address-book demo
# Run from the project root: ./target/debug/riversd

# bundle_path must be at the top level (not under [base])
bundle_path = "address-book-bundle/"

[base]
host      = "0.0.0.0"
port      = 8080
log_level = "info"

[base.tls]
# No cert/key paths: auto-generates on first startup into data/tls/
redirect = false    # internal service — do not compete for port 80

[base.admin_api.tls]
require_client_cert = false
