name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Build matrix ──────────────────────────────────────────────────
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: rivers-linux-x86_64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: rivers-linux-aarch64
            cross: true
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: rivers-darwin-aarch64
          - os: macos-13
            target: x86_64-apple-darwin
            artifact: rivers-darwin-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: rivers-windows-x86_64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux aarch64)
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build binaries
        shell: bash
        env:
          BUILD_TARGET: ${{ matrix.target }}
          USE_CROSS: ${{ matrix.cross }}
        run: |
          if [ "$USE_CROSS" = "true" ]; then
            cross build --release --target "$BUILD_TARGET" \
              -p riversd -p riversctl -p rivers-lockbox -p riverpackage
          else
            cargo build --release --target "$BUILD_TARGET" \
              -p riversd -p riversctl -p rivers-lockbox -p riverpackage
          fi

      - name: Package (Unix)
        if: runner.os != 'Windows'
        env:
          BUILD_TARGET: ${{ matrix.target }}
          ARTIFACT_NAME: ${{ matrix.artifact }}
        run: |
          VERSION="${GITHUB_REF_NAME}"
          DIR="rivers-${VERSION}-${ARTIFACT_NAME}"
          mkdir -p "$DIR/bin" "$DIR/config"
          for bin in riversd riversctl rivers-lockbox riverpackage; do
            cp "target/${BUILD_TARGET}/release/${bin}" "$DIR/bin/"
            chmod +x "$DIR/bin/${bin}"
          done
          cp packaging/config/riversd.toml "$DIR/config/"
          cp LICENSE README.md "$DIR/"
          [ -f packaging/systemd/riversd.service ] && cp packaging/systemd/riversd.service "$DIR/"
          tar -czf "${DIR}.tar.gz" "$DIR"
          echo "ASSET=${DIR}.tar.gz" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $VERSION = $env:GITHUB_REF_NAME
          $DIR = "rivers-${VERSION}-${{ matrix.artifact }}"
          New-Item -ItemType Directory -Force -Path "$DIR/bin", "$DIR/config"
          foreach ($bin in @("riversd", "riversctl", "rivers-lockbox", "riverpackage")) {
            Copy-Item "target/${{ matrix.target }}/release/${bin}.exe" "$DIR/bin/"
          }
          Copy-Item "packaging/config/riversd.toml" "$DIR/config/"
          Copy-Item "LICENSE", "README.md" "$DIR/"
          Compress-Archive -Path "$DIR" -DestinationPath "${DIR}.zip"
          echo "ASSET=${DIR}.zip" >> $env:GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ env.ASSET }}

  # ── Debian packages ───────────────────────────────────────────────
  package-deb:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux x86_64 build
        uses: actions/download-artifact@v4
        with:
          name: rivers-linux-x86_64

      - name: Build .deb packages (base, lib, plugins)
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARCH="amd64"
          tar xzf rivers-*.tar.gz

          # ── rivers (base) ──
          BASE="rivers_${VERSION}_${ARCH}"
          mkdir -p "${BASE}/DEBIAN" "${BASE}/usr/bin" "${BASE}/etc/rivers" \
                   "${BASE}/lib/systemd/system" "${BASE}/var/lib/rivers" \
                   "${BASE}/var/log/rivers" "${BASE}/var/lib/rivers/lockbox"
          cat > "${BASE}/DEBIAN/control" << CTRL
          Package: rivers
          Version: ${VERSION}
          Architecture: ${ARCH}
          Maintainer: Paul Castone <paul.castone@gmail.com>
          Depends: rivers-lib (= ${VERSION})
          Recommends: rivers-plugins
          Section: net
          Priority: optional
          Description: Rivers application server — declarative API framework
           Rivers is a declarative app-service framework written in Rust.
          CTRL
          cp packaging/debian/postinst "${BASE}/DEBIAN/"
          cp packaging/debian/prerm "${BASE}/DEBIAN/"
          cp packaging/debian/conffiles "${BASE}/DEBIAN/"
          chmod 755 "${BASE}/DEBIAN/postinst" "${BASE}/DEBIAN/prerm"
          cp rivers-*/bin/riversd rivers-*/bin/riversctl \
             rivers-*/bin/rivers-lockbox rivers-*/bin/riverpackage "${BASE}/usr/bin/"
          chmod 755 "${BASE}/usr/bin/"*
          cp packaging/config/riversd.toml "${BASE}/etc/rivers/"
          cp packaging/systemd/riversd.service "${BASE}/lib/systemd/system/"
          dpkg-deb --build "$BASE"

          # ── rivers-lib ──
          LIB="rivers-lib_${VERSION}_${ARCH}"
          mkdir -p "${LIB}/DEBIAN" "${LIB}/usr/lib/rivers"
          cat > "${LIB}/DEBIAN/control" << CTRL
          Package: rivers-lib
          Version: ${VERSION}
          Architecture: ${ARCH}
          Maintainer: Paul Castone <paul.castone@gmail.com>
          Section: libs
          Priority: optional
          Description: Rivers shared libraries and engines
          CTRL
          # Note: dynamic libs would be collected from a dynamic build
          # For CI, this is a placeholder — populate from dynamic build artifacts
          dpkg-deb --build "$LIB"

          # ── rivers-plugins ──
          PLUG="rivers-plugins_${VERSION}_${ARCH}"
          mkdir -p "${PLUG}/DEBIAN" "${PLUG}/usr/lib/rivers/plugins"
          cat > "${PLUG}/DEBIAN/control" << CTRL
          Package: rivers-plugins
          Version: ${VERSION}
          Architecture: ${ARCH}
          Maintainer: Paul Castone <paul.castone@gmail.com>
          Depends: rivers-lib (= ${VERSION})
          Section: libs
          Priority: optional
          Description: Rivers datasource driver plugins
          CTRL
          dpkg-deb --build "$PLUG"

      - name: Upload .deb packages
        uses: actions/upload-artifact@v4
        with:
          name: deb-packages
          path: "*.deb"

  # ── RPM packages ──────────────────────────────────────────────────
  package-rpm:
    needs: build
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - uses: actions/checkout@v4

      - name: Install rpmbuild
        run: dnf install -y rpm-build

      - name: Download Linux x86_64 build
        uses: actions/download-artifact@v4
        with:
          name: rivers-linux-x86_64

      - name: Build .rpm packages (base, lib, plugins)
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          tar xzf rivers-*.tar.gz

          mkdir -p rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS,BUILDROOT}
          BR="rpmbuild/BUILDROOT/rivers-${VERSION}-0.x86_64"
          mkdir -p "${BR}/usr/bin" "${BR}/etc/rivers" \
                   "${BR}/usr/lib/systemd/system" \
                   "${BR}/usr/lib64/rivers" "${BR}/usr/lib64/rivers/plugins" \
                   "${BR}/var/lib/rivers" "${BR}/var/log/rivers" \
                   "${BR}/var/lib/rivers/lockbox"
          cp rivers-*/bin/* "${BR}/usr/bin/"
          chmod 755 "${BR}/usr/bin/"*
          cp packaging/config/riversd.toml "${BR}/etc/rivers/"
          cp packaging/systemd/riversd.service "${BR}/usr/lib/systemd/system/"

          cp packaging/rpm/rivers.spec rpmbuild/SPECS/
          rpmbuild --define "_topdir $(pwd)/rpmbuild" \
                   --define "version ${VERSION}" \
                   --define "release 0" \
                   -bb rpmbuild/SPECS/rivers.spec || true

          find rpmbuild/RPMS -name '*.rpm' -exec cp {} . \;

      - name: Upload .rpm packages
        uses: actions/upload-artifact@v4
        with:
          name: rpm-packages
          path: "*.rpm"

  # ── GitHub Release ────────────────────────────────────────────────
  release:
    needs: [build, package-deb, package-rpm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: List release assets
        run: find . -name '*.tar.gz' -o -name '*.zip' -o -name '*.deb' -o -name '*.rpm' | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            *.tar.gz
            *.zip
            *.deb
            *.rpm
