name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Build matrix ──────────────────────────────────────────────────
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: rivers-linux-x86_64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: rivers-linux-aarch64
            cross: true
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: rivers-darwin-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: rivers-windows-x86_64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        shell: bash
        run: |
          curl -sSfL https://github.com/cross-rs/cross/releases/latest/download/cross-x86_64-unknown-linux-gnu.tar.gz \
            | tar xzf - -C "$HOME/.cargo/bin"

      - name: Build binaries
        shell: bash
        env:
          BUILD_TARGET: ${{ matrix.target }}
          USE_CROSS: ${{ matrix.cross }}
        run: |
          if [ "$USE_CROSS" = "true" ]; then
            cross build --release --target "$BUILD_TARGET" \
              -p riversd -p riversctl -p rivers-lockbox -p riverpackage
          else
            cargo build --release --target "$BUILD_TARGET" \
              -p riversd -p riversctl -p rivers-lockbox -p riverpackage
          fi

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        env:
          BUILD_TARGET: ${{ matrix.target }}
          ARTIFACT_NAME: ${{ matrix.artifact }}
        run: |
          VERSION="${GITHUB_REF_NAME}"
          DIR="rivers-${VERSION}-${ARTIFACT_NAME}"
          mkdir -p "$DIR/bin" "$DIR/config"
          for bin in riversd riversctl rivers-lockbox riverpackage; do
            cp "target/${BUILD_TARGET}/release/${bin}" "$DIR/bin/"
            chmod +x "$DIR/bin/${bin}"
          done
          cp packaging/config/riversd.toml "$DIR/config/"
          cp LICENSE README.md "$DIR/"
          [ -f packaging/systemd/riversd.service ] && cp packaging/systemd/riversd.service "$DIR/"
          tar -czf "${DIR}.tar.gz" "$DIR"
          echo "ASSET=${DIR}.tar.gz" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $VERSION = $env:GITHUB_REF_NAME
          $ARTIFACT = "${{ matrix.artifact }}"
          $DIR = "rivers-${VERSION}-${ARTIFACT}"
          New-Item -ItemType Directory -Force -Path "$DIR\bin", "$DIR\config"
          $TARGET = "${{ matrix.target }}"
          foreach ($bin in @("riversd", "riversctl", "rivers-lockbox", "riverpackage")) {
            Copy-Item "target\${TARGET}\release\${bin}.exe" "$DIR\bin\"
          }
          Copy-Item "packaging\config\riversd.toml" "$DIR\config\"
          Copy-Item "LICENSE" "$DIR\"
          Copy-Item "README.md" "$DIR\"
          Compress-Archive -Path "$DIR" -DestinationPath "${DIR}.zip"
          echo "ASSET=${DIR}.zip" >> $env:GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ env.ASSET }}

  # ── Dynamic build (shared libs + plugins) ─────────────────────────
  build-dynamic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build dynamic libraries
        shell: bash
        run: |
          # Switch rivers-runtime to dylib
          sed -i 's/crate-type = \["rlib"\]/crate-type = ["dylib"]/' crates/rivers-runtime/Cargo.toml

          # Build with prefer-dynamic
          export CARGO_PROFILE_RELEASE_LTO=off
          export RUSTFLAGS='-C prefer-dynamic'

          echo "==> Building runtime dylib..."
          cargo build --release -p rivers-runtime

          echo "==> Building engine cdylibs..."
          cargo build --release -p rivers-engine-v8 -p rivers-engine-wasm || true

          echo "==> Building plugin cdylibs..."
          cargo build --release \
            -p rivers-plugin-cassandra \
            -p rivers-plugin-couchdb \
            -p rivers-plugin-elasticsearch \
            -p rivers-plugin-influxdb \
            -p rivers-plugin-kafka \
            -p rivers-plugin-ldap \
            -p rivers-plugin-mongodb \
            -p rivers-plugin-nats \
            -p rivers-plugin-rabbitmq \
            -p rivers-plugin-redis-streams || true

          # Revert
          sed -i 's/crate-type = \["dylib"\]/crate-type = ["rlib"]/' crates/rivers-runtime/Cargo.toml

          # Collect artifacts
          mkdir -p dynamic-libs dynamic-plugins
          for f in target/release/librivers_runtime.so \
                   target/release/librivers_engine_v8.so \
                   target/release/librivers_engine_wasm.so \
                   target/release/librivers_drivers_builtin.so \
                   target/release/librivers_storage_backends.so \
                   target/release/librivers_lockbox_engine.so; do
            [ -f "$f" ] && cp "$f" dynamic-libs/ && echo "  lib: $(basename $f)" || true
          done
          for f in target/release/librivers_plugin_*.so; do
            [ -f "$f" ] && cp "$f" dynamic-plugins/ && echo "  plugin: $(basename $f)" || true
          done

          echo "==> Libraries:"
          ls -lh dynamic-libs/ || echo "  (none)"
          echo "==> Plugins:"
          ls -lh dynamic-plugins/ || echo "  (none)"

          tar czf rivers-dynamic-libs.tar.gz dynamic-libs/ dynamic-plugins/

      - name: Upload dynamic libraries
        uses: actions/upload-artifact@v4
        with:
          name: dynamic-libs
          path: rivers-dynamic-libs.tar.gz

  # ── Debian packages ───────────────────────────────────────────────
  package-deb:
    needs: [build, build-dynamic]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux x86_64 build
        uses: actions/download-artifact@v4
        with:
          name: rivers-linux-x86_64

      - name: Download dynamic libraries
        uses: actions/download-artifact@v4
        with:
          name: dynamic-libs

      - name: Build .deb packages (base, lib, plugins)
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARCH="amd64"
          tar xzf rivers-*.tar.gz
          tar xzf rivers-dynamic-libs.tar.gz

          # ── rivers (base) ──
          BASE="rivers_${VERSION}_${ARCH}"
          mkdir -p "${BASE}/DEBIAN" "${BASE}/usr/bin" "${BASE}/etc/rivers" \
                   "${BASE}/lib/systemd/system" "${BASE}/var/lib/rivers" \
                   "${BASE}/var/log/rivers" "${BASE}/var/lib/rivers/lockbox"

          cat > "${BASE}/DEBIAN/control" <<EOF
          Package: rivers
          Version: ${VERSION}
          Architecture: ${ARCH}
          Maintainer: Paul Castone <paul.castone@gmail.com>
          Depends: rivers-lib (= ${VERSION})
          Recommends: rivers-plugins
          Section: net
          Priority: optional
          Description: Rivers application server
           Declarative app-service framework in Rust.
          EOF
          sed -i 's/^          //' "${BASE}/DEBIAN/control"

          cp packaging/debian/postinst "${BASE}/DEBIAN/"
          cp packaging/debian/prerm "${BASE}/DEBIAN/"
          cp packaging/debian/conffiles "${BASE}/DEBIAN/"
          chmod 755 "${BASE}/DEBIAN/postinst" "${BASE}/DEBIAN/prerm"
          cp rivers-*/bin/* "${BASE}/usr/bin/"
          chmod 755 "${BASE}/usr/bin/"*
          cp packaging/config/riversd.toml "${BASE}/etc/rivers/"
          cp packaging/systemd/riversd.service "${BASE}/lib/systemd/system/"
          dpkg-deb --build --root-owner-group "$BASE"

          # ── rivers-lib ──
          LIB="rivers-lib_${VERSION}_${ARCH}"
          mkdir -p "${LIB}/DEBIAN" "${LIB}/usr/lib/rivers"
          cat > "${LIB}/DEBIAN/control" <<EOF
          Package: rivers-lib
          Version: ${VERSION}
          Architecture: ${ARCH}
          Maintainer: Paul Castone <paul.castone@gmail.com>
          Section: libs
          Priority: optional
          Description: Rivers shared libraries and engines
           Runtime library, V8/WASM engines, built-in drivers, storage, LockBox.
          EOF
          sed -i 's/^          //' "${LIB}/DEBIAN/control"
          # Copy dynamic libraries
          cp dynamic-libs/*.so "${LIB}/usr/lib/rivers/" 2>/dev/null || true
          dpkg-deb --build --root-owner-group "$LIB"

          # ── rivers-plugins ──
          PLUG="rivers-plugins_${VERSION}_${ARCH}"
          mkdir -p "${PLUG}/DEBIAN" "${PLUG}/usr/lib/rivers/plugins"
          cat > "${PLUG}/DEBIAN/control" <<EOF
          Package: rivers-plugins
          Version: ${VERSION}
          Architecture: ${ARCH}
          Maintainer: Paul Castone <paul.castone@gmail.com>
          Depends: rivers-lib (= ${VERSION})
          Section: libs
          Priority: optional
          Description: Rivers datasource driver plugins
           MongoDB, Elasticsearch, Cassandra, CouchDB, InfluxDB, Kafka, RabbitMQ, NATS, Redis Streams, LDAP.
          EOF
          sed -i 's/^          //' "${PLUG}/DEBIAN/control"
          # Copy plugin cdylibs
          cp dynamic-plugins/*.so "${PLUG}/usr/lib/rivers/plugins/" 2>/dev/null || true
          dpkg-deb --build --root-owner-group "$PLUG"

      - name: Upload .deb packages
        uses: actions/upload-artifact@v4
        with:
          name: deb-packages
          path: "*.deb"

  # ── RPM packages ──────────────────────────────────────────────────
  package-rpm:
    needs: [build, build-dynamic]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install rpmbuild
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Download Linux x86_64 build
        uses: actions/download-artifact@v4
        with:
          name: rivers-linux-x86_64

      - name: Download dynamic libraries
        uses: actions/download-artifact@v4
        with:
          name: dynamic-libs

      - name: Build .rpm packages (base, lib, plugins)
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          tar xzf rivers-*.tar.gz

          mkdir -p rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}

          # Create a simple binary-only spec that packages pre-built binaries
          cat > rpmbuild/SPECS/rivers.spec <<'SPEC'
          Name:       rivers
          Version:    %{pkg_version}
          Release:    0%{?dist}
          Summary:    Declarative app-service framework in Rust
          License:    Apache-2.0
          URL:        https://github.com/pcastone/rivers

          %description
          Rivers is a declarative app-service framework written in Rust.

          # ── Base package ──
          %install
          install -D -m 0755 %{_sourcedir}/riversd       %{buildroot}%{_bindir}/riversd
          install -D -m 0755 %{_sourcedir}/riversctl      %{buildroot}%{_bindir}/riversctl
          install -D -m 0755 %{_sourcedir}/rivers-lockbox %{buildroot}%{_bindir}/rivers-lockbox
          install -D -m 0755 %{_sourcedir}/riverpackage   %{buildroot}%{_bindir}/riverpackage
          install -D -m 0640 %{_sourcedir}/riversd.toml   %{buildroot}%{_sysconfdir}/rivers/riversd.toml
          install -D -m 0644 %{_sourcedir}/riversd.service %{buildroot}/usr/lib/systemd/system/riversd.service
          install -d -m 0755 %{buildroot}%{_sharedstatedir}/rivers
          install -d -m 0755 %{buildroot}%{_localstatedir}/log/rivers
          install -d -m 0700 %{buildroot}%{_sharedstatedir}/rivers/lockbox

          %files
          %{_bindir}/riversd
          %{_bindir}/riversctl
          %{_bindir}/rivers-lockbox
          %{_bindir}/riverpackage
          %config(noreplace) %{_sysconfdir}/rivers/riversd.toml
          /usr/lib/systemd/system/riversd.service
          %dir %{_sharedstatedir}/rivers
          %dir %{_localstatedir}/log/rivers
          %dir %{_sharedstatedir}/rivers/lockbox

          %pre
          getent group rivers > /dev/null 2>&1 || groupadd -r rivers
          getent passwd rivers > /dev/null 2>&1 || useradd -r -g rivers -d /var/lib/rivers -s /sbin/nologin rivers

          %post
          systemctl daemon-reload 2>/dev/null || true
          systemctl enable riversd.service 2>/dev/null || true

          %preun
          systemctl stop riversd.service 2>/dev/null || true
          systemctl disable riversd.service 2>/dev/null || true

          %postun
          systemctl daemon-reload 2>/dev/null || true
          SPEC
          # Strip leading whitespace from spec
          sed -i 's/^          //' rpmbuild/SPECS/rivers.spec

          # Copy sources
          mkdir -p rpmbuild/SOURCES
          cp rivers-*/bin/* rpmbuild/SOURCES/
          cp packaging/config/riversd.toml rpmbuild/SOURCES/
          cp packaging/systemd/riversd.service rpmbuild/SOURCES/

          rpmbuild --define "_topdir $(pwd)/rpmbuild" \
                   --define "pkg_version ${VERSION}" \
                   -bb rpmbuild/SPECS/rivers.spec

          find rpmbuild/RPMS -name '*.rpm' -exec cp {} . \;

      - name: Upload .rpm packages
        uses: actions/upload-artifact@v4
        with:
          name: rpm-packages
          path: "*.rpm"

  # ── GitHub Release ────────────────────────────────────────────────
  release:
    needs: [build, build-dynamic, package-deb, package-rpm]
    if: always() && needs.build.result != 'failure'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: List release assets
        run: find . -name '*.tar.gz' -o -name '*.zip' -o -name '*.deb' -o -name '*.rpm' | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            *.tar.gz
            *.zip
            *.deb
            *.rpm
