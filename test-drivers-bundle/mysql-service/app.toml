[data.datasources.mysql]
name     = "mysql"
driver   = "mysql"
host     = "localhost"
port     = 3306
database = "rivers"
username = "rivers"
nopassword = false
credentials_source = "lockbox://mysql-test"


[data.dataviews.list_customers]
name       = "list_customers"
datasource = "mysql"
query      = "SELECT id, name, email, city, country FROM customers ORDER BY id LIMIT ? OFFSET ?"

[[data.dataviews.list_customers.parameters]]
name = "limit"
type = "integer"
required = false
default = 20

[[data.dataviews.list_customers.parameters]]
name = "offset"
type = "integer"
required = false
default = 0

[data.dataviews.list_products]
name       = "list_products"
datasource = "mysql"
query      = "SELECT id, name, sku, price, category FROM products ORDER BY id"

[data.dataviews.list_orders]
name       = "list_orders"
datasource = "mysql"
query      = "SELECT o.id, c.name as customer, p.name as product, o.quantity, o.total, o.status FROM orders o JOIN customers c ON o.customer_id = c.id JOIN products p ON o.product_id = p.id ORDER BY o.id"

# Write DataViews

[data.dataviews.insert_customer]
name       = "insert_customer"
datasource = "mysql"
query      = "INSERT INTO customers (city, country, email, name) VALUES (?, ?, ?, ?)"

[[data.dataviews.insert_customer.parameters]]
name = "city"
type = "string"
required = false
default = "Unknown"

[[data.dataviews.insert_customer.parameters]]
name = "country"
type = "string"
required = false
default = "US"

[[data.dataviews.insert_customer.parameters]]
name = "email"
type = "string"
required = true

[[data.dataviews.insert_customer.parameters]]
name = "name"
type = "string"
required = true

[data.dataviews.update_customer]
name       = "update_customer"
datasource = "mysql"
query      = "UPDATE customers SET city = ?, name = ? WHERE id = ?"

[[data.dataviews.update_customer.parameters]]
name = "city"
type = "string"
required = true

[[data.dataviews.update_customer.parameters]]
name = "id"
type = "integer"
required = true

[[data.dataviews.update_customer.parameters]]
name = "name"
type = "string"
required = true

[data.dataviews.delete_customer]
name       = "delete_customer"
datasource = "mysql"
query      = "DELETE FROM customers WHERE id = ?"

[[data.dataviews.delete_customer.parameters]]
name = "id"
type = "integer"
required = true

# Read Views

[api.views.list_customers]
path = "customers"
method = "GET"
view_type = "Rest"
auth = "none"

[api.views.list_customers.handler]
type = "dataview"
dataview = "list_customers"

[api.views.list_customers.parameter_mapping.query]
limit = "limit"
offset = "offset"

[api.views.list_products]
path = "products"
method = "GET"
view_type = "Rest"
auth = "none"

[api.views.list_products.handler]
type = "dataview"
dataview = "list_products"

[api.views.list_orders]
path = "orders"
method = "GET"
view_type = "Rest"
auth = "none"

[api.views.list_orders.handler]
type = "dataview"
dataview = "list_orders"

# Write Views

[api.views.create_customer]
path = "customers"
method = "POST"
view_type = "Rest"
auth = "none"

[api.views.create_customer.handler]
type = "dataview"
dataview = "insert_customer"

[api.views.create_customer.parameter_mapping.body]
name = "name"
email = "email"
city = "city"
country = "country"

[api.views.update_customer]
path = "customers/{id}"
method = "PUT"
view_type = "Rest"
auth = "none"

[api.views.update_customer.handler]
type = "dataview"
dataview = "update_customer"

[api.views.update_customer.parameter_mapping.path]
id = "id"

[api.views.update_customer.parameter_mapping.body]
name = "name"
city = "city"

[api.views.delete_customer]
path = "customers/{id}"
method = "DELETE"
view_type = "Rest"
auth = "none"

[api.views.delete_customer.handler]
type = "dataview"
dataview = "delete_customer"

[api.views.delete_customer.parameter_mapping.path]
id = "id"
