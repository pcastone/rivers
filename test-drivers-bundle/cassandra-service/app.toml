[data.datasources.cassandra]
name     = "cassandra"
driver   = "cassandra"
host     = "localhost"
port     = 9042
database = "rivers"
nopassword = true

# ─────────────────────────────────────────────
# DataViews
# ─────────────────────────────────────────────

[data.dataviews.list_events]
name       = "list_events"
datasource = "cassandra"
query      = "SELECT service, day, event_time, event_type, payload, trace_id FROM events WHERE service = ? AND day = ? LIMIT 100"

[[data.dataviews.list_events.parameters]]
name = "service"
type = "string"
required = true

[[data.dataviews.list_events.parameters]]
name = "day"
type = "string"
required = true

[data.dataviews.user_sessions]
name       = "user_sessions"
datasource = "cassandra"
query      = "SELECT user_id, session_id, login_at, ip_address, user_agent FROM user_sessions WHERE user_id = ?"

[[data.dataviews.user_sessions.parameters]]
name = "user_id"
type = "string"
required = true

[data.dataviews.product_views]
name       = "product_views"
datasource = "cassandra"
query      = "SELECT sku, view_count FROM product_views"

# ─────────────────────────────────────────────
# Views
# ─────────────────────────────────────────────

[api.views.list_events]
path       = "events"
method     = "GET"
view_type  = "Rest"
auth       = "none"

[api.views.list_events.handler]
type     = "dataview"
dataview = "list_events"

[api.views.list_events.parameter_mapping.query]
service = "service"
day     = "day"

[api.views.user_sessions]
path       = "sessions/{user_id}"
method     = "GET"
view_type  = "Rest"
auth       = "none"

[api.views.user_sessions.handler]
type     = "dataview"
dataview = "user_sessions"

[api.views.user_sessions.parameter_mapping.path]
user_id = "user_id"

[api.views.product_views]
path       = "product-views"
method     = "GET"
view_type  = "Rest"
auth       = "none"

[api.views.product_views.handler]
type     = "dataview"
dataview = "product_views"
